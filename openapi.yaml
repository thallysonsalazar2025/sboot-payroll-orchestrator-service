openapi: 3.0.3
info:
  title: Payroll Orchestrator Service
  version: 1.0.0
  description: >-
    API responsável por receber requisições do BFF, consolidar dados da empresa,
    dados do empregado e cálculo tributário da folha, publicando o payload final.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/payroll-orchestrations:
    post:
      summary: Orquestra os componentes de empresa, empregado e cálculo da folha
      operationId: orchestratePayroll
      tags:
        - Payroll Orchestration
      parameters:
        - in: header
          name: X-Idempotency-Key
          schema:
            type: string
          required: false
          description: Chave de idempotência para evitar reprocessamento.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayrollRequest'
      responses:
        '202':
          description: Fluxo aceito e payload consolidado publicado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrationResponse'
        '400':
          description: Requisição inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Colaborador não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Falha em integração com serviço downstream.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PayrollRequest:
      type: object
      required:
        - employeeId
        - payrollPeriod
        - baseSalary
        - requestedBy
      properties:
        correlationId:
          type: string
          example: 9257b3aa-d3db-4fd1-8852-a6a9298a1dc5
        employeeId:
          type: string
          example: emp-001
        payrollPeriod:
          type: string
          pattern: ^\d{4}-\d{2}$
          example: 2026-03
        baseSalary:
          type: number
          format: double
          example: 8500.00
        requestedBy:
          type: string
          example: payroll-bff
    OrchestrationResponse:
      type: object
      properties:
        orchestrationId:
          type: string
        correlationId:
          type: string
        messageId:
          type: string
        status:
          type: string
          example: ORCHESTRATED
        processedAt:
          type: string
          format: date-time
        reusedResult:
          type: boolean
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        details:
          type: array
          items:
            type: string
